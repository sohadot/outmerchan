name: quality-gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run the OutMerchant Quality Gate
        run: python3 main/scripts/quality_gate.py
